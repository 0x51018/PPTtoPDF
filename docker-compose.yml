services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      - API_PORT=3001
      - TMP_ROOT=/tmp/pptx-to-pdf
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    env_file:
      - .env
    environment:
      - HOSTNAME=0.0.0.0
      - WEB_PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - api
